  <line x1="256" y1="75" x2="256" y2="437" stroke="#D9CFFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="75" y1="256" x2="437" y2="256" stroke="#D9CFFF" stroke-width="1.5" opacity="0.25"/>
  <!-- 봉인 점들 -->
